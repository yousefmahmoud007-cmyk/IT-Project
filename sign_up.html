<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morning Bites | Sign Up</title>
  <link rel="icon" type="image/png" href="images/logo_icon.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
</head>

<body>
  <header>
      <div class="left-header">
         <a href="index.html" class="menu-btn" title="Go Home" style="text-decoration: none;">🏠</a> 
         <div class="logo-img">
           <img id="logo" src="images/logo_light.jpeg" alt="Morning Bites Logo"> 
         </div>     
         <button onclick="toggleTheme()" class="theme-btn">     
           <i class="fa-solid fa-moon"></i>   
         </button>  
      </div>    
  </header>
  <div class="form-title">
    <h1><i class="fa-solid fa-user-plus"></i> Create Account</h1>
    <p>Join Morning Bites — Your morning is waiting</p>
  </div>
  <form class="sign-form" id="signupForm" novalidate>
    <div class="upload">
      <div class="view" id="view"><i class="fa-solid fa-user"></i></div>
      <label class="uploadbtn" for="imgInput">
        <i class="fa-solid fa-camera"></i> Upload Photo
      </label>
      <input type="file" id="imgInput" accept="image/*" hidden>
    </div>
    <div class="form-body">
      <div class="info-form-input">
        <label><i class="fa-solid fa-user"></i> FULL NAME</label>
        <input type="text" id="fullname" placeholder="Enter your Full Name" required>
        <span class="error" id="err-name"></span>
      </div>
      <div class="info-form-input">
        <label><i class="fa-solid fa-envelope"></i> EMAIL</label>
        <input type="email" id="email" placeholder="Enter your Email" required>
        <span class="error" id="err-email"></span>
      </div>
      <div class="info-form-input">
        <label><i class="fa-solid fa-phone"></i> PHONE NUMBER</label>
        <input type="tel" id="phone" placeholder="Enter your Phone Number" required>
        <span class="error" id="err-phone"></span>
      </div>
      <div class="info-form-input">
        <label><i class="fa-solid fa-key"></i> PASSWORD</label>
        <div class="eye">
          <input type="password" id="password" placeholder="Min 8 characters" minlength="8" required>
          <button type="button" class="eye2" id="togglePass"><i class="fa-solid fa-eye"></i></button>
        </div>
        <span class="error" id="err-pass"></span>
      </div>
      <div class="info-form-input">
        <label><i class="fa-solid fa-lock"></i> CONFIRM PASSWORD</label>
        <div class="eye">
          <input type="password" id="confirmPassword" placeholder="Re-Enter your password" required>
          <button type="button" class="eye2" id="toggleConfirm"><i class="fa-solid fa-eye"></i></button>
        </div>
        <span class="error" id="err-confirm"></span>
      </div>
    </div>
    <button type="submit" class="submit">Create Account</button>
    <div class="tet">Already have an account? <a href="sign_in.html">Sign in</a></div>
  </form>
  <footer>&copy; 2026 Morning Bites - All Rights Reserved</footer>
  <script src="script.js"></script>
</body>

</html>
