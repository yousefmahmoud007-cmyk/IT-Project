<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morning Bites | Sign in</title>
  <link rel="icon" type="image/png" href="images/logo_icon.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
</head>

<body>
  <div class="form-title">
    <h1><i class="fa-solid fa-lock"></i> Sign In</h1>
    <p>Welcome back to Morning Bites</p>
  </div>
  <form class="sign-form" novalidate>
    <div class="info-form-input">
      <label><i class="fa-solid fa-envelope"></i> EMAIL</label>
      <input type="email" placeholder="Enter your email" required>
      <span class="form-error" id="err-email"></span>
    </div>
    <div class="info-form-input">
      <label><i class="fa-solid fa-key"></i> PASSWORD</label>
      <div class="eye">
        <input type="password" placeholder="••••••••" minlength="5" maxlength="15" required>
        <button type="button" class="eye2" id="togglePass"><i class="fa-solid fa-eye"></i></button>
      </div>
      <span class="form-error" id="err-pass"></span>
    </div>
    <button type="submit" class="submit">Sign in</button>
    <div class="tet">Don't have an account? <a href="sign_up.html">Sign up</a></div>
  </form>
  <footer>&copy; 2026 Morning Bites - All Rights Reserved</footer>
  <script src="script_sign.js"></script>
</body>

</html>
